<script>
(function (window, document) {
  "use strict";

  const TOKEN_KEY = "librarySurveyAccessToken";
  const UI_STATE_KEY = "librarySurveyV2UiState";
  const MAX_FILE_BYTES = 12 * 1024 * 1024;
  const STEPS = [
    {id:"dashboard",label:"Dashboard",description:"작업 현황과 시작점"},
    {id:"settings",label:"Settings",description:"조사 기본정보 저장"},
    {id:"upload",label:"Upload",description:"Excel 응답 업로드"},
    {id:"mapping",label:"Mapping",description:"문항 유형 검토"},
    {id:"analysis",label:"Analysis",description:"동적 통계 생성"},
    {id:"quality",label:"Quality",description:"데이터 품질 확인"},
    {id:"ai",label:"AI Report",description:"AI 총평과 계획"},
    {id:"download",label:"Download",description:"최종 Excel 저장"}
  ];
  const QUESTION_TYPES = [
    {value:"EXCLUDE",label:"분석 제외"},{value:"PERSONAL_INFO",label:"개인정보"},
    {value:"RESPONDENT",label:"응답자 특성"},{value:"SINGLE",label:"단일응답"},
    {value:"MULTIPLE",label:"복수응답"},{value:"SCALE",label:"만족도 척도"},
    {value:"RECOMMENDATION",label:"재이용·추천"},{value:"TEXT",label:"주관식"}
  ];
  const SCALE_KINDS = [
    {value:"",label:"해당 없음"},{value:"RECOMMENDATION_1_5",label:"5점 추천의향"},
    {value:"NPS_0_10",label:"NPS 0~10"}
  ];

  const state = {
    currentPage:"dashboard",completedSteps:[],accessibleSteps:["dashboard","settings"],
    selectedFile:null,filePayload:null,uploadStatus:"idle",projectName:"프로젝트 미선택",
    settingsExists:false,settingsStatus:"loading",settingsError:"",settingsData:null,
    respondentCount:0,lastSavedAt:"",qualityStatus:"NOT_RUN",authenticated:false,
    loading:false,error:"",serverStatus:null,mappings:[],mappingMeta:null,
    mappingStatus:"idle",mappingMessage:"",mappingDirty:false,rawDataStatus:"idle",rawDataMessage:"",analysisStatus:"idle",
    analysisProgress:0,analysisStage:"분석 시작 버튼을 눌러 주세요.",analysisLogs:[],
    analysisSummary:null,analysisError:"",analysisStartedAt:null,analysisTimer:null,
    qualityRunStatus:"idle",qualityProgress:0,qualityStage:"통계 분석 완료 후 품질검사를 실행해 주세요.",
    qualityLogs:[],qualityResult:null,qualityError:"",qualityTimer:null,aiRunStatus:"idle",
    aiProgress:0,aiStage:"품질검사 통과 후 AI 총평을 생성할 수 있습니다.",aiLogs:[],
    aiResult:null,aiError:"",aiGeneratedAt:"",aiTimer:null,downloadStatus:"idle",
    downloadResult:null,downloadError:"",downloadGeneratedAt:""
  };

  function el(id){return document.getElementById(id);}
  function token(){return sessionStorage.getItem(TOKEN_KEY)||"";}
  function setState(patch,persist){Object.keys(patch||{}).forEach(function(key){state[key]=patch[key];});if(persist!==false)persistState();render();}
  function persistState(){sessionStorage.setItem(UI_STATE_KEY,JSON.stringify({currentPage:state.currentPage,uploadStatus:state.uploadStatus}));}
  function restoreState(){try{const saved=JSON.parse(sessionStorage.getItem(UI_STATE_KEY)||"{}");if(STEPS.some(function(step){return step.id===saved.currentPage;}))state.currentPage=saved.currentPage;if(saved.uploadStatus==="success")state.uploadStatus="success";}catch(ignored){sessionStorage.removeItem(UI_STATE_KEY);}}

  function friendlyError(error){
    const raw=String(error&&error.message?error.message:error||"");
    const safe=raw.replace(/^Exception:\s*/i,"").split(/\n\s*at\s+/)[0].slice(0,500);
    if(/인증|token|토큰|만료/i.test(raw))return "인증 세션을 확인할 수 없습니다. 다시 로그인한 뒤 시도해 주세요.";
    if(/size|크기|12\s*MB/i.test(raw))return "파일이 최대 허용 용량 12MB를 초과했습니다. 응답 파일을 나누거나 불필요한 시트를 제거해 주세요.";
    if(/Drive|드라이브|권한|permission|access denied/i.test(raw))return safe||"Drive 접근 권한을 확인할 수 없습니다. 배포 권한을 확인한 뒤 다시 시도해 주세요.";
    if(/변환.*실패|변환할 수|conversion/i.test(raw))return safe||"Excel 변환에 실패했습니다. 파일을 다시 저장한 뒤 시도해 주세요.";
    if(/원자료.*컬럼|필수.*컬럼|컬럼.*누락|중복.*(문항|헤더)|빈.*(문항|헤더)|문항.*헤더.*비어/i.test(raw))return safe;
    if(/문항 매핑.*(미저장|저장되지|먼저)|매핑.*저장.*필요|먼저.*문항.*(구조|유형).*저장/i.test(raw))return safe;
    if(/11_범용원자료|범용원자료.*(생성|저장|실패)|원자료.*생성.*실패/i.test(raw))return safe;
    if(/xlsx|xls|excel|형식|signature|서명/i.test(raw))return "지원되는 Excel 파일로 확인되지 않았습니다. .xlsx 또는 .xls 형식으로 다시 저장한 뒤 선택해 주세요.";
    if(/매핑|문항|columnNumber|척도|scoreMap|JSON/i.test(raw))return "문항 매핑을 처리하지 못했습니다. 검토 필요 문항과 척도·점수 매핑 값을 확인한 뒤 다시 시도해 주세요.";
    if(/통계|분석 결과|보고서/i.test(raw))return "통계 분석을 시작할 수 없습니다. 범용 원자료와 저장된 문항 매핑이 준비되었는지 확인한 뒤 다시 시도해 주세요.";
    if(/gemini|ai|총평|향후계획/i.test(raw))return "AI 보고서를 생성하지 못했습니다. 품질검사 상태와 Gemini 설정을 확인한 뒤 다시 시도해 주세요.";
    return "요청을 완료하지 못했습니다. 파일과 네트워크 상태를 확인한 뒤 다시 시도해 주세요.";
  }

  const api = {
    invoke:function(executor,options){
      options=options||{};const useGlobalLoading=options.globalLoading!==false;if(useGlobalLoading)setLoading(true,options.loadingText||"요청을 처리하고 있습니다.");
      return new Promise(function(resolve,reject){
        let runner=google.script.run.withSuccessHandler(function(result){if(useGlobalLoading)setLoading(false);if(!result||result.success!==true){const message=friendlyError(result&&result.error?result.error:result&&result.message);showStatus(message,"error");reject(new Error(message));return;}resolve(result);}).withFailureHandler(function(error){if(useGlobalLoading)setLoading(false);const message=friendlyError(error);showStatus(message,"error");reject(new Error(message));});
        executor(runner);
      });
    },
    validateToken:function(){return this.invoke(function(runner){runner.validateWebAppTokenFromWeb(token());},{loadingText:"세션을 확인하고 있습니다."});},
    login:function(passcode){return this.invoke(function(runner){runner.verifyWebAppPasscodeFromWeb(passcode);},{loadingText:"담당자 인증 중입니다."});},
    settings:function(){return this.invoke(function(runner){runner.secureGetSurveySettingsForWeb(token());},{loadingText:"프로젝트 정보를 불러오고 있습니다."});},
    saveSettings:function(payload){return this.invoke(function(runner){runner.secureSaveSurveySettingsFromWeb(payload,token());},{loadingText:"조사 기본정보를 저장하고 있습니다."});},
    systemStatus:function(){return this.invoke(function(runner){runner.secureGetDynamicSurveySystemStatusFromWeb(token());},{loadingText:"작업 상태를 확인하고 있습니다."});},
    createRawData:function(filePayload){return this.invoke(function(runner){runner.secureCreateGenericRawSheetFromWeb(filePayload,token());},{loadingText:"11_범용원자료를 생성하고 있습니다."});},
    inspectMapping:function(filePayload){return this.invoke(function(runner){runner.secureInspectSurveyExcelForMappingFromWeb(filePayload,token());},{loadingText:"AI 추천 문항 매핑을 분석하고 있습니다."});},
    inspectMappingByRule:function(filePayload){return this.invoke(function(runner){runner.secureInspectSurveyExcelByRuleFromWeb(filePayload,token());},{loadingText:"규칙 기반 문항 매핑을 분석하고 있습니다."});},
    savedMappings:function(){return this.invoke(function(runner){runner.secureGetSavedSurveyMappingsFromWeb(token());},{loadingText:"저장된 문항 매핑을 확인하고 있습니다."});},
    saveMappings:function(payload){return this.invoke(function(runner){runner.secureSaveSurveyMappingsFromWeb(payload,token());},{loadingText:"검토한 문항 매핑을 저장하고 있습니다."});},
    generateAnalysis:function(){return this.invoke(function(runner){runner.secureGenerateDynamicStatisticalReportFromWeb(token());},{globalLoading:false});},
    runQuality:function(){return this.invoke(function(runner){runner.secureGetDynamicSurveyQualityFromWeb(token());},{globalLoading:false});},
    generateAiReport:function(){return this.invoke(function(runner){runner.secureGenerateDynamicAIReportFromWeb(token());},{globalLoading:false});},
    exportReport:function(fileName){return this.invoke(function(runner){runner.secureExportDynamicSurveyReportFromWeb(fileName,token(),{});},{globalLoading:false});},
    logout:function(){return this.invoke(function(runner){runner.logoutWebAppFromWeb(token());},{loadingText:"로그아웃하고 있습니다."});}
  };

  function setLoading(active,message){state.loading=active;el("v2Loading").hidden=!active;el("v2LoadingText").textContent=message||"처리 중입니다.";}
  function showStatus(message,type){const box=el("v2GlobalStatus");box.hidden=!message;box.textContent=message||"";box.className="v2-global-status"+(type?" v2-global-status--"+type:"");if(message)showToast(message);}
  function showToast(message){const toast=document.createElement("div");toast.className="v2-toast";toast.textContent=message;el("v2ToastRegion").appendChild(toast);window.setTimeout(function(){toast.remove();},4200);}
  function qualityLabel(value){const key=String(value||"NOT_RUN").toUpperCase();return key==="PASS"?"품질 통과":key==="WARNING"?"검토 필요":key==="FAIL"?"품질 실패":"품질검사 전";}
  function stepStatus(step){if(step.id===state.currentPage)return "current";if(state.completedSteps.indexOf(step.id)>=0)return "complete";if(step.id==="quality"&&state.qualityStatus==="WARNING")return "warning";return state.accessibleSteps.indexOf(step.id)>=0?"available":"locked";}

  function deriveWorkflow(){
    const status=state.serverStatus||{};const complete=[];const accessible=["dashboard","settings"];
    if(state.settingsExists){complete.push("settings");accessible.push("upload");}
    if(state.uploadStatus==="success"||status.rawSheetExists||status.mappingExists){complete.push("upload");accessible.push("mapping");}
    if(status.mappingExists){complete.push("mapping");}
    if(status.mappingExists&&status.rawSheetExists){accessible.push("analysis");}
    if(status.statisticsComplete){complete.push("analysis");accessible.push("quality");}
    if(status.qualityStatus&&status.qualityStatus!=="NOT_RUN"&&status.qualityAiAllowed){complete.push("quality");accessible.push("ai");}
    if(status.aiComplete){complete.push("ai");accessible.push("download");}
    setState({completedSteps:complete,accessibleSteps:Array.from(new Set(accessible)),qualityStatus:status.qualityStatus||"NOT_RUN"},false);
  }

  function render(){
    el("v2HeaderProject").textContent=state.projectName||"프로젝트 미선택";
    el("v2HeaderRespondents").textContent=state.respondentCount>0?state.respondentCount.toLocaleString("ko-KR")+"명":"응답 데이터 없음";
    el("v2HeaderSaved").textContent=state.lastSavedAt||"아직 저장되지 않음";
    const badge=el("v2HeaderQuality");badge.textContent=qualityLabel(state.qualityStatus);badge.className="v2-badge "+(state.qualityStatus==="PASS"?"v2-badge--success":state.qualityStatus==="WARNING"?"v2-badge--warning":state.qualityStatus==="FAIL"?"v2-badge--error":"v2-badge--neutral");
    renderSteps();renderPage();renderDashboard();renderBottomNav();renderSettings();renderUpload();renderMapping();renderAnalysis();renderQuality();renderAiReport();renderDownload();
  }

  function renderSteps(){const list=el("v2StepList");list.textContent="";STEPS.forEach(function(step,index){const status=stepStatus(step);const item=document.createElement("li");item.className="v2-step v2-step--"+status;const button=document.createElement("button");button.type="button";button.disabled=status==="locked";button.title=status==="locked"?"이전 단계를 완료해야 접근할 수 있습니다.":step.description;button.setAttribute("aria-current",status==="current"?"page":"false");button.innerHTML='<span class="v2-step__number">'+(index+1)+'</span><span><strong>'+step.label+'</strong><small style="display:block">'+step.description+'</small></span><span class="v2-step__status">'+(status==="complete"?"✓ 완료":status==="warning"?"! 검토":status==="locked"?"잠김":"")+'</span>';button.addEventListener("click",function(){navigate(step.id);});item.appendChild(button);list.appendChild(item);});}
  function renderPage(){el("v2PageDashboard").hidden=state.currentPage!=="dashboard";el("v2PageSettings").hidden=state.currentPage!=="settings";el("v2PageUpload").hidden=state.currentPage!=="upload";el("v2PageMapping").hidden=state.currentPage!=="mapping";el("v2PageAnalysis").hidden=state.currentPage!=="analysis";el("v2PageQuality").hidden=state.currentPage!=="quality";el("v2PageAi").hidden=state.currentPage!=="ai";el("v2PageDownload").hidden=state.currentPage!=="download";el("v2Main").focus({preventScroll:true});}
  function renderDashboard(){const count=state.completedSteps.length;el("v2ProgressText").textContent=count+" / "+STEPS.length+" 단계";el("v2ProgressBar").style.width=Math.round(count/STEPS.length*100)+"%";const summary=el("v2WorkflowSummary");summary.textContent="";STEPS.forEach(function(step){const li=document.createElement("li");const status=stepStatus(step);li.className=status==="complete"?"is-complete":status==="current"?"is-current":"";li.textContent=step.label;summary.appendChild(li);});const hasWork=Boolean(state.serverStatus&&(state.serverStatus.mappingExists||state.serverStatus.rawSheetExists));el("v2ContinueContent").innerHTML=hasWork?"<strong>진행 중인 설문 작업이 있습니다.</strong><span>Sidebar에서 접근 가능한 다음 단계를 선택해 이어서 작업하세요.</span>":"<strong>진행 중인 작업이 없습니다.</strong><span>‘새 설문 분석 시작’을 눌러 조사 기본정보부터 확인하세요.</span>";el("v2RecentContent").innerHTML=state.serverStatus&&state.serverStatus.statisticsComplete?"<strong>생성된 통계 보고서가 있습니다.</strong><span>기존 운영 화면에서 보고서와 다운로드 기능을 이용할 수 있습니다.</span>":"<strong>최근 보고서가 없습니다.</strong><span>통계 보고서 생성 후 이 영역에서 상태를 확인할 수 있습니다.</span>";}
  function renderBottomNav(){const index=STEPS.findIndex(function(step){return step.id===state.currentPage;});const previous=STEPS[index-1];const next=STEPS[index+1];el("v2CurrentStepLabel").textContent=(index+1)+"단계 · "+STEPS[index].label;const previousButton=el("v2PreviousButton");previousButton.disabled=!previous;previousButton.textContent=previous?"이전 · "+previous.label:"이전";const nextButton=el("v2NextButton");if(!next){nextButton.disabled=true;nextButton.textContent="마지막 단계";}else{nextButton.textContent=next.label+"로 이동";nextButton.disabled=state.accessibleSteps.indexOf(next.id)<0;nextButton.title=nextButton.disabled?"이전 단계를 완료해야 이동할 수 있습니다.":"";}}
  function renderUpload(){const file=state.selectedFile;el("v2SelectedFile").hidden=!file;if(file)el("v2SelectedFile").innerHTML="<strong>"+escapeHtml(file.name)+"</strong><span>"+formatBytes(file.size)+"</span>";el("v2UploadButton").disabled=!state.filePayload||state.uploadStatus==="reading";const status=el("v2UploadStatus");status.className="v2-upload-status"+(state.uploadStatus==="success"?" v2-upload-status--success":state.uploadStatus==="error"?" v2-upload-status--error":"");status.textContent=state.uploadStatus==="success"?"Excel 파일을 메모리에 준비했습니다. Mapping 단계에서 문항을 분석해 주세요.":state.uploadStatus==="reading"?"브라우저에서 Excel 파일을 읽고 있습니다.":state.uploadStatus==="ready"?"파일 선택이 완료되었습니다. 아직 서버 원자료는 생성하지 않습니다.":state.error||"분석할 파일을 선택해 주세요.";}

  const SETTINGS_FIELDS={surveyName:"v2SurveyName",reportTitle:"v2ReportTitle",dashboardTitle:"v2DashboardReportTitle",surveyPurpose:"v2SurveyPurpose",surveyPeriod:"v2SurveyPeriod",surveyTarget:"v2SurveyTarget",surveyMethod:"v2SurveyMethod",analysisMethod:"v2AnalysisMethod",department:"v2Department",contact:"v2Contact",organization:"v2Organization"};
  function fillSettingsForm(settings){Object.keys(SETTINGS_FIELDS).forEach(function(key){el(SETTINGS_FIELDS[key]).value=settings&&settings[key]||"";});}
  function collectSettings(){const payload={};Object.keys(SETTINGS_FIELDS).forEach(function(key){payload[key]=el(SETTINGS_FIELDS[key]).value.trim();});return payload;}
  function renderSettings(){const status=el("v2SettingsStatus");status.textContent=state.settingsStatus==="saving"?"00_설정 시트에 조사정보를 저장하고 있습니다.":state.settingsStatus==="saved"?"조사정보가 저장되었습니다. Excel 단계로 이동할 수 있습니다.":state.settingsStatus==="error"?state.settingsError:state.settingsExists?"저장된 조사정보를 불러왔습니다.":"필수 조사정보를 입력한 뒤 저장해 주세요.";status.className="v2-upload-status"+(state.settingsStatus==="saved"?" v2-upload-status--success":state.settingsStatus==="error"?" v2-upload-status--error":"");el("v2SaveSettingsButton").disabled=state.settingsStatus==="saving";}
  function saveSettings(){const payload=collectSettings();const missing=["surveyName","surveyPurpose","surveyPeriod","surveyTarget","surveyMethod"].filter(function(key){return !payload[key];});if(missing.length){const labels={surveyName:"조사명",surveyPurpose:"조사목적",surveyPeriod:"조사기간",surveyTarget:"조사대상",surveyMethod:"조사방법"};const message="필수 항목을 입력해 주세요: "+missing.map(function(key){return labels[key];}).join(", ");setState({settingsStatus:"error",settingsError:message});showStatus(message,"error");return;}setState({settingsStatus:"saving",settingsError:""},false);api.saveSettings(payload).then(function(result){const settings=result.settings||payload;fillSettingsForm(settings);setState({settingsExists:true,settingsStatus:"saved",settingsError:"",settingsData:settings,projectName:settings.surveyName||payload.surveyName,lastSavedAt:new Date().toLocaleString("ko-KR")},false);deriveWorkflow();showStatus("조사 기본정보를 저장했습니다. Excel 단계로 이동합니다.","success");navigate("upload");}).catch(function(error){setState({settingsStatus:"error",settingsError:error.message});});}

    el("v2AccessForm").addEventListener("submit",function(event){event.preventDefault();const passcode=el("v2AccessPasscode").value.trim();el("v2AccessError").textContent="";if(!passcode){el("v2AccessError").textContent="인증 코드를 입력해 주세요.";return;}api.login(passcode).then(function(result){if(!result.authenticated){el("v2AccessError").textContent="인증 코드를 확인해 주세요.";return;}sessionStorage.setItem(TOKEN_KEY,result.token);el("v2AccessPasscode").value="";openApplication();}).catch(function(error){el("v2AccessError").textContent=error.message;});});
    el("v2StartButton").addEventListener("click",function(){navigate("settings");});el("v2ChooseFileButton").addEventListener("click",function(){el("v2FileInput").click();});el("v2FileInput").addEventListener("change",function(event){selectFile(event.target.files[0]);});["dragenter","dragover"].forEach(function(name){el("v2Dropzone").addEventListener(name,function(event){event.preventDefault();el("v2Dropzone").classList.add("is-dragging");});});["dragleave","drop"].forEach(function(name){el("v2Dropzone").addEventListener(name,function(event){event.preventDefault();el("v2Dropzone").classList.remove("is-dragging");if(name==="drop")selectFile(event.dataTransfer.files[0]);});});el("v2UploadButton").addEventListener("click",upload);
    el("v2SettingsForm").addEventListener("submit",function(event){event.preventDefault();saveSettings();});
    el("v2LoadSavedMappingButton").addEventListener("click",function(){loadSavedMappings(true);});el("v2RuleMappingButton").addEventListener("click",function(){inspectCurrentMapping(true);});el("v2AiMappingButton").addEventListener("click",function(){inspectCurrentMapping(false);});el("v2SaveMappingButton").addEventListener("click",saveMappings);el("v2RetryRawDataButton").addEventListener("click",function(){createRawData(true);});
    el("v2AnalysisStartButton").addEventListener("click",startAnalysis);
    el("v2QualityStartButton").addEventListener("click",startQuality);
    el("v2AiStartButton").addEventListener("click",startAiReport);el("v2AiRegenerateButton").addEventListener("click",startAiReport);
    el("v2ExportButton").addEventListener("click",startExport);el("v2DownloadFileButton").addEventListener("click",function(){try{downloadExportResult(state.downloadResult);}catch(error){showStatus(friendlyError(error),"error");}});el("v2NewSurveyButton").addEventListener("click",startNewSurvey);el("v2BackDashboardButton").addEventListener("click",function(){navigate("dashboard");});
    el("v2PreviousButton").addEventListener("click",function(){const index=STEPS.findIndex(function(step){return step.id===state.currentPage;});if(index>0)navigate(STEPS[index-1].id);});el("v2NextButton").addEventListener("click",function(){const index=STEPS.findIndex(function(step){return step.id===state.currentPage;});if(index<STEPS.length-1)navigate(STEPS[index+1].id);});el("v2MenuButton").addEventListener("click",function(){const open=el("v2Sidebar").classList.toggle("is-open");this.setAttribute("aria-expanded",String(open));});el("v2LogoutButton").addEventListener("click",function(){api.logout().catch(function(){return null;}).then(function(){sessionStorage.removeItem(TOKEN_KEY);sessionStorage.removeItem(UI_STATE_KEY);window.location.reload();});});
  }

  window.SurveyDashboardV2={getState:function(){return Object.assign({},state);},navigate:navigate};
  window.addEventListener("load",initialize);
})(window,document);
</script>
