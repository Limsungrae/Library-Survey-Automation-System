<style>
  :root{--v2-primary:#1e4e79;--v2-secondary:#2e73b8;--v2-bg:#f6f8fb;--v2-surface:#fff;--v2-success:#22c55e;--v2-warning:#f59e0b;--v2-error:#ef4444;--v2-ai:#7255a8;--v2-text:#172033;--v2-muted:#64748b;--v2-border:#dce3ec;--v2-shadow:0 8px 24px rgba(30,78,121,.08);font-family:Inter,"Noto Sans KR","Apple SD Gothic Neo",Arial,sans-serif;color:var(--v2-text);background:var(--v2-bg)}
  *{box-sizing:border-box}body{margin:0;background:var(--v2-bg);color:var(--v2-text)}button,input{font:inherit}.v2-sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}.skip-link{position:fixed;left:16px;top:-80px;z-index:100;padding:12px 16px;background:#fff;color:var(--v2-primary);border:2px solid var(--v2-primary)}.skip-link:focus{top:12px}
  :focus-visible{outline:3px solid #f4b942;outline-offset:3px}.v2-access{min-height:100vh;display:grid;place-items:center;padding:24px;background:linear-gradient(135deg,#eef4fa,#f8fafc)}.v2-access__panel{width:min(430px,100%);padding:40px;background:#fff;border:1px solid var(--v2-border);border-radius:18px;box-shadow:var(--v2-shadow)}.v2-access__panel h1{margin:4px 0 8px}.v2-access__panel label{display:block;margin:28px 0 8px;font-weight:700}.v2-access__panel input{width:100%;padding:13px;border:1px solid #aebaca;border-radius:8px}.v2-access__panel .v2-button{width:100%;margin-top:16px}.v2-field-error{min-height:22px;color:#b91c1c;font-weight:650}

  .v2-button{min-height:42px;padding:10px 16px;border:1px solid transparent;border-radius:8px;font-weight:750;cursor:pointer}.v2-button:disabled{cursor:not-allowed;opacity:.48}.v2-button--primary{background:var(--v2-primary);color:#fff}.v2-button--secondary{background:var(--v2-secondary);color:#fff}.v2-button--quiet{background:#fff;color:var(--v2-primary);border-color:var(--v2-border)}.v2-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 9px;border-radius:99px;font-size:.72rem;font-weight:800}.v2-badge--neutral{background:#edf1f5;color:#526073}.v2-badge--success{background:#dcfce7;color:#166534}.v2-badge--warning{background:#fef3c7;color:#92400e}.v2-badge--error{background:#fee2e2;color:#991b1b}.v2-badge--ai{background:#f1ecfa;color:var(--v2-ai)}

  .v2-bottom-nav{max-width:1240px;margin:32px auto 0;padding-top:20px;border-top:1px solid var(--v2-border);display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:16px}.v2-bottom-nav button:last-child{justify-self:end}.v2-bottom-nav p{margin:0;color:var(--v2-muted);font-size:.82rem;font-weight:750}.v2-toast-region{position:fixed;right:20px;bottom:20px;z-index:60;display:grid;gap:10px}.v2-toast{max-width:380px;padding:14px 16px;border-radius:9px;background:#172033;color:#fff;box-shadow:var(--v2-shadow)}.v2-loading{position:fixed;inset:0;z-index:80;display:flex;align-items:center;justify-content:center;gap:12px;background:rgba(246,248,251,.87);font-weight:800}.v2-loading[hidden]{display:none}.v2-spinner{width:25px;height:25px;border:3px solid #cbd5e1;border-top-color:var(--v2-primary);border-radius:50%;animation:v2-spin .8s linear infinite}@keyframes v2-spin{to{transform:rotate(360deg)}}
